name: Restaurant Kiosk Automated Deployer

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      
      # Step 1: Extract code out of the GitHub repo vault
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # 🌟 Step 2: Install the official Terraform CLI engine on the virtual machine
      - name: Setup HashiCorp Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # Step 3: Run validation checks on your infrastructure manifests
      - name: Initialize and Validate Terraform Blueprints
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      # Step 4: Verify the Docker deployment unit compiles cleanly
      - name: Build Kiosk Container Application Image
        run: |
          docker build -t restaurant-kiosk:latest .
          echo "Container successfully compiled and ready for deployment!"