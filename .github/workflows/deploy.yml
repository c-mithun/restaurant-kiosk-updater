name: Restaurant Kiosk Automated Deployer

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      
      # Step 1: Extract code out of the repository vault
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      # Step 2: Install the official Terraform CLI engine
      - name: Setup HashiCorp Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      # 🌟 Step 3: Automatically format the files directly in the cloud runner
      - name: Format Terraform Blueprints Automatically
        run: |
          cd terraform
          terraform fmt

      # Step 4: Run validation checks on infrastructure manifests
      - name: Initialize and Validate Terraform Blueprints
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      # Step 5: Lint the Container file using Hadolint
      - name: Lint Dockerfile Configuration
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # Step 6: Verify the Docker deployment unit compiles cleanly
      - name: Build Kiosk Container Application Image
        run: |
          docker build -t restaurant-kiosk:latest .
          echo "Container successfully compiled, linted, and verified!"